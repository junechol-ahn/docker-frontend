name: Deploy to Production on Main Push

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

  build-verify:
    name: Verify Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t frontend-verify:${{ github.sha }} .

  deploy-production:
    name: Deploy to Production (EBS)
    runs-on: ubuntu-latest
    needs: build-verify
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Generate deployment package
        run: zip -r deploy-package.zip . -x '*.git*' -x 'node_modules/*'

      - name: Deploy to EBS (Production)
        uses: aws-actions/aws-elasticbeanstalk-deploy@v1.0.0
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          application-name: ${{ secrets.EB_APPLICATION_NAME }}
          environment-name: ${{ secrets.EB_PRODUCTION_ENV_NAME }}
          version-label: "prod-${{ github.sha }}"
          deployment-package-path: deploy-package.zip
          wait-for-deployment: true
          deployment-timeout: 900
