name: Deploy to Staging on PR

on:
  pull_request:
    branches:
      - main # or develop, depending on your base branch

jobs:
  deploy-pr:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-2 # Replace with your AWS region

    - name: Generate deployment package
      run: zip -r deploy-package.zip . -x '*.git*'
      # Customize the above command to build and package your application (e.g., install dependencies, run build scripts)

    - name: Deploy to AWS Elastic Beanstalk
      uses: aws-actions/aws-elasticbeanstalk-deploy@v1
      with:
        application-name: your-application-name # Replace with your EB application name
        environment-name: your-staging-env-name # Replace with your staging environment name
        version-label: "PR-${{ github.event.pull_request.number }}-${{ github.sha }}"
        deployment-package: deploy-package.zip

